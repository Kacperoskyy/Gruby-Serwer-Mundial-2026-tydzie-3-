<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruby Serwer Mundial 2026 - Tydzień 3</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent-blue: #00d2ff;
            --accent-purple: #9d50bb;
            --text: #ffffff;
        }
        body { 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        header { margin-bottom: 40px; text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 20px var(--accent-blue); }
        
        .container { 
            width: 100%; max-width: 900px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }
        
        table { width: 100%; border-collapse: collapse; }
        th { 
            color: var(--accent-blue); 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            padding: 15px; 
            border-bottom: 2px solid var(--accent-purple); 
        }
        td { 
            padding: 12px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            text-align: center; 
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* Stylizacja kolumny z miejscem */
        .rank-col { font-weight: bold; color: var(--accent-blue); }
        
        tr:hover { background: rgba(0, 210, 255, 0.1); }
        
        footer { margin-top: 50px; text-align: center; }
        .new-era { 
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mundial 2026: Tydzień 3.</h1>
        <p>Nowa tabela, nowe zasady – kto zajmie miejsce na podium?</p>
    </header>

                </tr>
            </thead>
            <tbody>
                <!-- 11 miejsc dla graczy -->
                <tr><td class="rank-col">1</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                <tr><td class="rank-col">2</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                <tr><td class="rank-col">3</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                <tr><td class="rank-col">4</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                <tr><td class="rank-col">5</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                <tr><td class="rank-col">6</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                <tr><td class="rank-col">7</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                <tr><td class="rank-col">8</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
                <tr><td class="rank-col">9</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>

    </div>

    <footer>
        <div class="new-era">TYDZIEŃ 3. ROZPOCZĘTY – MIEJSCA CZEKAJĄ!</div>
    </footer>

</body>
</html>
